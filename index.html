<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Dashboard</title>
    <link rel="stylesheet" href="styles.css" /> 
  </head>
  <body>
    <!-- =====================
       NAVIGATION BAR
       ===================== -->
    <nav>Developer Dashboard</nav>

    <!-- =====================
       MAIN CONTENT AREA
       ===================== -->
    <div class="container">
      <!-- Profile Card -->
      <div class="profile-card">
        <h2>Ibrahim Danjuma</h2>
        <p>Student Developer</p>
        <p>I am a computer science student</p>
      </div>

      <!-- Skills Section -->
      <div class="skills-section">
        <h3>My Skills</h3>
        <div class="skills-grid">
          <span>HTML</span>
          <span>CSS</span>
          <span>VS Code</span>
          <span>GitHub</span>
          <span>Azure</span>
        </div>
      </div>

      <!-- Learning Progress -->
      <div class="progress-section">
        <h3>Learning Progress</h3>

        <p>AZ-900 Azure Fundamentals</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 0%"></div>
        </div>

        <p>GitHub & Version Control</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </div>
    <!-- end container -->
  </body>
</html>
